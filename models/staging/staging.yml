version: 2

models:
  - name: stg_ecommerce
    description: "Staging layer - raw ecommerce data cleaned and renamed"
    columns:
      - name: user_id
        description: "Source user identifier"
        tests:
          - not_null

      - name: product_id
        description: "Source product identifier"
        tests:
          - not_null

      - name: category
        description: "Product category"
        tests:
          - not_null

      - name: price_usd
        description: "Original price in USD"
        tests:
          - not_null

      - name: discount_pct
        description: "Discount percentage applied"
        tests:
          - not_null

      - name: final_price_usd
        description: "Final price after discount in USD"
        tests:
          - not_null

      - name: purchase_date
        description: "Date of purchase"
        tests:
          - not_null